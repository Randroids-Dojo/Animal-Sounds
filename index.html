<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Animal Sounds</title>
  <meta name="description" content="Tap an animal to hear its sound">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/lion.svg" type="image/svg+xml">
  <!-- --sky from style.css; also in manifest.json — keep in sync -->
  <meta name="theme-color" content="#DFF1F7">
  <link rel="preload" href="animals.json" as="fetch" crossorigin>
  <link rel="preload" href="fonts/fredoka.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.google.com">
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Animal Sounds</h1>
    <div id="daily-time" aria-label="Today's screen time">
      <span>Today</span>
      <output id="daily-time-value">0:00:00</output>
    </div>
    <nav id="page-tabs" aria-label="Play pages">
      <button type="button" data-page-target="animals" aria-pressed="true">🐾 Sounds</button>
      <button type="button" data-page-target="puzzle" aria-pressed="false">🧩 Puzzle</button>
    </nav>
  </header>

  <div id="page-viewport">
    <div id="pages">
      <section id="animal-screen" class="app-screen" aria-label="Animal sounds">
        <main id="grid" aria-label="Animals"></main>
        <p class="credits">Animal art: OpenMoji.org (CC BY-SA 4.0)</p>
      </section>

      <section id="puzzle-screen" class="app-screen" aria-label="Animal puzzle">
        <div class="puzzle-heading">
          <p>Animal puzzle</p>
          <h2 id="puzzle-name">Find the pieces!</h2>
          <span>Put each piece where it belongs.</span>
        </div>
        <section class="puzzle-section" aria-labelledby="puzzle-slots-label">
          <h3 id="puzzle-slots-label">Empty spots</h3>
          <div id="puzzle-board" aria-label="Empty puzzle spots"></div>
        </section>
        <section class="puzzle-section" aria-labelledby="puzzle-pieces-label">
          <h3 id="puzzle-pieces-label">Mixed-up pieces</h3>
          <div id="puzzle-tray" aria-label="Mixed-up puzzle pieces"></div>
        </section>
        <div id="puzzle-success" aria-live="assertive" hidden>
          <span class="success-star" aria-hidden="true">★</span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
          <span class="success-particle" aria-hidden="true"></span>
        </div>
      </section>
    </div>
  </div>

  <div id="overlay" hidden>
    <div class="player-frame">
      <div id="yt-slot"></div>
    </div>
    <div id="shield" aria-hidden="true"></div>
    <div id="loading" hidden>
      <img id="loading-img" alt="">
      <div id="loading-name"></div>
    </div>
    <button id="close-btn" aria-label="Hold to go back">✕</button>
  </div>

  <section id="time-limit" aria-live="assertive" aria-modal="true" role="alertdialog" hidden>
    <div class="time-limit-card">
      <div class="time-limit-icon" aria-hidden="true">☀️</div>
      <h2 id="time-limit-title"></h2>
      <p id="time-limit-message"></p>
    </div>
  </section>

  <section id="idle-dim" aria-live="polite" hidden>
    <div>
      <div class="idle-dim-icon" aria-hidden="true">🌙</div>
      <p>Tap to wake up Animal Sounds</p>
    </div>
  </section>
</body>
</html>
