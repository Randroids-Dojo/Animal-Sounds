<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Animal Sounds</title>
  <meta name="description" content="Tap an animal to hear its sound">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/lion.svg" type="image/svg+xml">
  <meta name="theme-color" content="#DFF1F7">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://www.google.com">
  <link rel="stylesheet" href="style.css">
  <script defer src="app.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Animal Sounds</h1>
  </header>

  <main id="grid" class="grid" aria-label="Animals"></main>

  <p class="credits">Animal art: OpenMoji.org (CC BY-SA 4.0)</p>

  <div id="overlay" class="overlay" hidden>
    <div class="player-frame">
      <div id="yt-slot"></div>
    </div>
    <div id="shield" class="shield" aria-hidden="true"></div>
    <div id="loading" class="loading" hidden>
      <img id="loading-img" class="loading-img" alt="">
      <div id="loading-name" class="loading-name"></div>
    </div>
    <button id="close-btn" class="close-btn" aria-label="Hold to go back">✕</button>
  </div>
</body>
</html>
